<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Free Rotate Card</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .scene {
    perspective: 1200px;
  }

  .card {
    width: 280px;
    height: 450px;
    position: relative;
    transform-style: preserve-3d;
    border-radius: 18px;
    cursor: grab;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    border: 2px solid black;
    position: absolute;
    backface-visibility: hidden;
  }

  .back {
    transform: rotateY(180deg);
  }
</style>
</head>

<body>

<div class="scene">
  <div class="card" id="card">
    <img src="front.jpg">
    <img src="back.jpg" class="back">
  </div>
</div>

<script>
  const card = document.getElementById("card");

  let isDragging = false;
  let startX = 0;
  let currentRotation = 0;

  function startDrag(x) {
    isDragging = true;
    startX = x;
    card.style.transition = "none";
  }

  function onDrag(x) {
    if (!isDragging) return;
    let delta = x - startX;
    let rotation = currentRotation + delta * 0.6;
    card.style.transform = `rotateY(${rotation}deg)`;
  }

  function endDrag(x) {
    if (!isDragging) return;
    isDragging = false;

    let delta = x - startX;
    currentRotation += delta * 0.6;

    card.style.transition = "transform 0.6s ease";

    if (currentRotation > 90) {
      currentRotation = 180;
    } else if (currentRotation < -90) {
      currentRotation = -180;
    } else {
      currentRotation = 0;
    }

    card.style.transform = `rotateY(${currentRotation}deg)`;
  }

  // Mouse
  card.addEventListener("mousedown", e => startDrag(e.clientX));
  window.addEventListener("mousemove", e => onDrag(e.clientX));
  window.addEventListener("mouseup", e => endDrag(e.clientX));

  // Touch
  card.addEventListener("touchstart", e => startDrag(e.touches[0].clientX));
  window.addEventListener("touchmove", e => onDrag(e.touches[0].clientX));
  window.addEventListener("touchend", e => endDrag(e.changedTouches[0].clientX));
</script>

</body>
</html>
